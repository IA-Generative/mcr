name: Slack PR Notification

on:
  pull_request:
    branches:
      - dev
    types: [opened, edited]

jobs:
  notify:
    if: >-
      github.event.action == 'opened' ||
      github.event.changes.base != null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Slack user
        id: slack-user
        run: |
          GITHUB_USER="${{ github.event.pull_request.user.login }}"
          SLACK_ID=$(jq -r --arg user "$GITHUB_USER" '.[$user] // empty' .github/slack-users.json)
          if [ -n "$SLACK_ID" ]; then
            echo "mention=<@$SLACK_ID>" >> "$GITHUB_OUTPUT"
          else
            echo "mention=$GITHUB_USER" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Nouvelle Pull Request"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Auteur:*\n${{ steps.slack-user.outputs.mention }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branche:*\n${{ github.head_ref }} → ${{ github.base_ref }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}>*"
                  }
                }
              ]
            }
