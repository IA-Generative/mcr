name: Sync issue type from bug/feedback template

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  sync-type:
    runs-on: ubuntu-latest
    steps:
      - name: Set issue type based on "Type de demande" answer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          BODY: ${{ github.event.issue.body }}
        run: |
          ANSWER=$(printf '%s\n' "$BODY" | awk '/^### Type de demande/{found=1; next} found && NF {print; exit}')

          case "$ANSWER" in
            "Retour utilisateur")
              gh issue edit "$NUMBER" --repo "$REPO" --type Feature
              ;;
            "Bug")
              gh issue edit "$NUMBER" --repo "$REPO" --type Bug
              ;;
            *)
              echo "ℹ️ No 'Type de demande' field found, skipping"
              ;;
          esac
