# When pushing to dev or data-dev, we need to build new images.
# Else, we can promote already built images to the next env
.is-build-mode: &is-build-mode '$CI_COMMIT_BRANCH == "data-dev" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH =~ /^test-.*$/'
.is-mep-tag: &is-mep-tag $CI_COMMIT_TAG =~ /^[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}$/

workflow:
  # Trigger pipeline on push to long running branches or on prod version tag (x.y.z)
  rules:
    - if: *is-mep-tag
      when: always
    - if: '$CI_COMMIT_BRANCH == "data-dev" || $CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^test-.*$/'
      when: always
      changes:
        - mcr-frontend/**/*
        - mcr-core/**/*
        - mcr-gateway/**/*
        - mcr-generation/**/*
        - mcr-capture-worker/**/*

include:
  - project: $CATALOG_PATH
    file: vault-ci.yml
    ref: main
  - project: $CATALOG_PATH
    file: kaniko-ci.yml
    ref: main

default:
  image: alpine:3.22.1

variables:
  IMAGE_REPOSITORY: "${REGISTRY_HOST}/${PROJECT_PATH}"

stages:
  - read-secret
  - get-image-tag
  - docker-build
  - filter-modules
  - rollout-infra

# Extends the catalog .kaniko:build-push with extra kaniko flags injected at runtime via before_script.
# We are doing it that way because:
# - KANIKO_EXTRA_ARGS is set as a CI params, which we can't access and can't override
# - The microservices job still need to pass extra build args in the form of --target
.mcr-kaniko-build:
  extends: .kaniko:build-push
  before_script:
    - |
      MCR_EXTRA="--skip-unused-stages --digest-file=digest.txt --ignore-path=/workspace"
      export EXTRA_BUILD_ARGS="${EXTRA_BUILD_ARGS} ${MCR_EXTRA}"

read_secret:
  stage: read-secret
  extends:
    - .vault:read_secret

get-image-tag:
  stage: get-image-tag
  script:
    - |
      set -eux

      if [[ "${CI_COMMIT_BRANCH:-}" == "dev" ]]; then
        TARGET_ENV="staging"
      elif [[ "${CI_COMMIT_BRANCH:-}" == "data-dev" ]]; then
        TARGET_ENV="data"
      elif [[ "${CI_COMMIT_BRANCH:-}" == "main" ]]; then
        TARGET_ENV="preprod"
      else
        # Default prefix for branches that are not dev, data-dev, or main
        # This is useful only when doing test on the ci
        TARGET_ENV="test"
      fi

      if [[ -n "${CI_COMMIT_TAG:-}" ]]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
        TARGET_ENV="prod"
      else
        IMAGE_TAG="${TARGET_ENV}-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "IMAGE_TAG=$IMAGE_TAG" >> vault.env
      echo "TARGET_ENV=$TARGET_ENV" >> vault.env
  artifacts:
    reports:
      dotenv: vault.env
    expire_in: 60 min

docker-build-frontend:
  variables:
    WORKING_DIR: mcr-frontend
    IMAGE_NAMES: ${CI_PROJECT_NAME}-frontend:${IMAGE_TAG}
    DOCKERFILE: "mcr-frontend/Dockerfile"
    EXTRA_BUILD_ARGS: "--target=production"
  stage: docker-build
  rules:
    - if: *is-build-mode
      changes:
        - mcr-frontend/**/*
  extends:
    - .kaniko-build-with-workspace
  after_script:
    - |
      set -x
      echo "Built frontend with image tag - ${IMAGE_TAG}"
      echo "FRONTEND_IMAGE_SHA=$(cat ./digest.txt)" >> digest.env
  artifacts:
    reports:
      dotenv: digest.env
    expire_in: 30 min

docker-build-core:
  variables:
    WORKING_DIR: mcr-core
    IMAGE_NAMES: ${CI_PROJECT_NAME}-core:${IMAGE_TAG}
    DOCKERFILE: "mcr-core/Dockerfile"
    EXTRA_BUILD_ARGS: "--target=api"
  rules:
    - if: *is-build-mode
      changes:
        - mcr-core/**/*
  stage: docker-build
