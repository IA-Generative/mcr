# Every app service reads its env from these files (container-side injection).
# File-based env is immune to host-shell shadowing, unlike ${VAR} interpolation.
x-env-files: &env-files
  - .env.local.docker
  - .env

services:
  redis:
    image: redis:8.0.3-alpine3.21
    container_name: mcr-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - mcr-network

  flower:
    build:
      context: ./mcr-core
      target: flower
    container_name: mcr-flower
    restart: always
    ports:
      - "5555:5555"
    env_file: *env-files
    environment:
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      - redis
    networks:
      - mcr-network

  transcription_worker:
    build:
      context: ./mcr-core
      target: worker-dev
    container_name: mcr-transcription-worker
    depends_on:
      - redis
    restart: always
    # Mirrors prod: SIGTERM is remapped to SIGQUIT (cold shutdown) so a stop requeues
    # the in-flight task immediately; stop_grace_period is the docker analog of k8s
    # terminationGracePeriodSeconds and must stay above worker_soft_shutdown_timeout (60s).
    stop_grace_period: 120s
    env_file: *env-files
    environment:
      - REMAP_SIGTERM=SIGQUIT
    ports:
      # Debugging port
      - "7002:7002"
    volumes:
      - ./mcr-core/mcr_meeting:/app/mcr_meeting
    develop:
      watch:
        - action: rebuild
          path: ./mcr-core/pyproject.toml
    networks:
      - mcr-network

  postgres:
    image: postgres:17.6
    container_name: mcr-postgres
    restart: always
    env_file: *env-files
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mcr-network

  orchestrator:
    build:
      context: ./mcr-gateway
      target: dev
    container_name: mcr-orchestrator
    ports:
      # Debugging port
      - "5678:5678"
    volumes:
      - ./mcr-gateway/mcr_gateway:/app/mcr_gateway
    develop:
      watch:
        - action: rebuild
          path: ./mcr-gateway/pyproject.toml
    networks:
      - mcr-network
    env_file: *env-files

  meeting:
    build:
      context: ./mcr-core
      target: api-dev
    container_name: mcr-core
    ports:
      - "8001:8001"
      # Debugging port
      - "7001:7001"
    depends_on:
      - postgres
    networks:
      - mcr-network
    volumes:
      - ./mcr-core/mcr_meeting:/app/mcr_meeting
    develop:
      watch:
        - action: rebuild
          path: ./mcr-core/pyproject.toml
    env_file: *env-files

  generation:
    build:
      context: ./mcr-generation
      target: dev
    container_name: mcr-generation
    env_file: *env-files
    ports:
      # Debugging port
      - "7003:7003"
    volumes:
      - ./mcr-generation/mcr_generation:/app/mcr_generation
    develop:
      watch:
        - action: rebuild
          path: ./mcr-generation/pyproject.toml
    networks:
      - mcr-network

  frontend:
    build:
      context: ./mcr-frontend
      target: dev
    container_name: mcr-frontend
    volumes:
      - ./mcr-frontend/src:/app/src
    develop:
      watch:
        - action: rebuild
          path: ./mcr-frontend/package.json
    env_file: *env-files
    environment:
      - VITE_HMR_CLIENT_PORT=8080
    networks:
      - mcr-network

  ingress:
    image: nginx:1.27-alpine
    container_name: mcr-ingress
    ports:
      # Published port must match INGRESS_LISTEN_PORT below.
      - "8080:8080"
    environment:
      - INGRESS_LISTEN_PORT=8080
      - INGRESS_GATEWAY_UPSTREAM=mcr-orchestrator:8000
      - INGRESS_FRONTEND_UPSTREAM=mcr-frontend:5173
      # Only substitute our INGRESS_* placeholders; leave nginx's own $vars alone.
      - NGINX_ENVSUBST_FILTER=^INGRESS_
    volumes:
      - ./docker/ingress/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - orchestrator
      - frontend
    networks:
      - mcr-network

  capture_worker:
    build:
      context: ./mcr-capture-worker
      target: dev
    container_name: mcr-capture-worker
    user: "1000:1000"
    ports:
      # Debugging port
      - "7004:7004"
    volumes:
      - ./mcr-capture-worker/mcr_capture_worker:/app/mcr_capture_worker
    develop:
      watch:
        - action: rebuild
          path: ./mcr-capture-worker/pyproject.toml
    env_file: *env-files
    environment:
      - HOME=/tmp
      - POSTGRES_PORT=5432
      - DEV=true
    networks:
      - mcr-network
    depends_on:
      - postgres

  migration:
    build:
      context: ./mcr-core
      target: api-dev
    container_name: mcr-migration
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      - postgres
    links:
      - postgres
    networks:
      - mcr-network
    volumes:
      - ./mcr-core/mcr_meeting:/app/mcr_meeting
    env_file: *env-files

  mailpit:
    image: axllent/mailpit:latest
    container_name: mcr-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - mcr-network

  minio:
    image: minio/minio:latest
    container_name: mcr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    # Reads MINIO_ROOT_USER / MINIO_ROOT_PASSWORD (mirrors of the S3 dev creds) from the file.
    env_file:
      - .env.local.docker
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - mcr-network

  minio-setup:
    image: minio/mc:latest
    container_name: mcr-minio-setup
    depends_on:
      - minio
    env_file:
      - .env.local.docker
    # This script makes sure that all requested buckets are created at startup
    # It also sets up the event notification for the audio bucket to send messages to the transcription task webhook
    # $$VAR (not ${VAR}) so the container shell expands from env_file, not compose interpolation.
    entrypoint: >
      /bin/sh -c "sleep 5;
      /usr/bin/mc alias set miniodocker $${S3_ENDPOINT} $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      /usr/bin/mc mb miniodocker/$${S3_BUCKET} --ignore-existing;
      /usr/bin/mc ilm rule add  --expire-days $${S3_ILM_EXPIRE_DAYS} miniodocker/$${S3_BUCKET};
      exit 0;"
    networks:
      - mcr-network

  kc_postgres:
    image: postgres:latest
    container_name: mcr-kc-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 2s
      retries: 300
    ports:
      - "5434:5432"
    env_file:
      - docker/auth/.env.kc.local
    networks:
      - mcr-network

  keycloak:
    image: quay.io/keycloak/keycloak:20.0.1
    container_name: mcr-keycloak
    volumes:
      - ./docker/auth/kc-mcr-local-config.json:/opt/keycloak/data/import/realm.json
    command:
      - start-dev
      - --features=preview
      - --http-port=8083
      - --import-realm
      - --proxy=edge
      - --hostname-url=http://keycloak.localhost:8083
      - --hostname-admin-url=http://keycloak.localhost:8083/
      - --hostname-strict=false
      - --hostname-strict-https=false
      - --health-enabled=true
      - --metrics-enabled=true
    healthcheck:
      test:
        ["CMD", "curl", "--head", "-fsS", "http://localhost:8083/health/ready"]
      interval: 1s
      timeout: 2s
      retries: 300
    env_file:
      - docker/auth/.env.kc.local
    ports:
      - "8083:8083"
    depends_on:
      kc_postgres:
        condition: service_healthy
        restart: true
    networks:
      mcr-network:
        aliases:
          - keycloak.localhost

networks:
  mcr-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
